<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeSwipe – Das interaktive Karteikarten-Kochbuch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#ff5a5f',
                            hover: '#e04e52',
                            light: '#fff0f0',
                            dark: '#3d1617'
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 12px -2px rgba(0, 0, 0, 0.03)',
                        'card': '0 20px 40px -10px rgba(0, 0, 0, 0.12)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .dark body {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        /* 3D Card Flip Mechanics */
        .perspective-1000 {
            perspective: 1000px;
        }
        
        .preserve-3d {
            transform-style: preserve-3d;
        }
        
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        
        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Premium custom scrollbar for cards */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }

        /* Touch interaction optimizations */
        .interactive-card {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-24 px-4 overflow-x-hidden transition-colors duration-300">

    <header class="w-full max-w-md flex justify-between items-center py-4 mb-2 z-50">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🃏</span>
            <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-primary to-rose-600 bg-clip-text text-transparent">RecipeSwipe</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:scale-105 active:scale-95 transition-all" title="Farbschema wechseln">
                <span id="theme-icon">🌙</span>
            </button>
            <span class="text-xs bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full font-bold shadow-sm text-slate-600 dark:text-slate-300" id="global-counter">0 Rezepte</span>
        </div>
    </header>

    <div id="homeView" class="view-section active w-full max-w-md flex flex-col gap-6">
        <div class="bg-gradient-to-br from-white to-slate-50 dark:from-slate-800 dark:to-slate-900 p-6 rounded-3xl shadow-premium border border-slate-100 dark:border-slate-800 text-center relative overflow-hidden group">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/10 rounded-full blur-xl group-hover:scale-125 transition-transform duration-500"></div>
            <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-2">Was kochen wir heute?</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-5">Wische spielerisch durch deine Rezeptkarten.<br>Links = Raus • Rechts = Behalten!</p>
            <button class="btn-start-game w-full py-4 px-6 bg-gradient-to-r from-primary to-rose-500 hover:from-primary-hover hover:to-rose-600 text-white font-bold rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/30 transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md transition-all duration-200 flex items-center justify-center gap-2" onclick="switchView('game')">
                <span>Auswahlrunde starten 🃏</span>
            </button>
        </div>

        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-extrabold text-slate-800 dark:text-white">Frische Vorschläge für dich</h3>
                <button onclick="renderDashboard()" class="text-xs font-semibold text-primary hover:text-primary-hover flex items-center gap-1">
                    <span>Neu laden</span> 🔄
                </button>
            </div>
            <div class="flex flex-col gap-3" id="dashboardSuggestions">
                </div>
        </div>
    </div>

    <div id="gameView" class="view-section hidden w-full max-w-md flex flex-col gap-4">
        <div class="flex justify-between items-center px-2">
            <div class="text-sm font-extrabold text-primary" id="gameStatus">Bereitmachen...</div>
            <button onclick="startGame()" class="text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-primary flex items-center gap-1">
                <span>Stapel mischen</span> 🔀
            </button>
        </div>
        
        <div class="deck-container relative w-full h-[520px] my-1 flex justify-center perspective-1000 select-none" id="deckContainer">
            </div>
        
        <div class="game-controls flex justify-center items-center gap-4 w-full px-4 mt-2" id="gameControls">
            </div>
    </div>

    <div id="listView" class="view-section hidden w-full max-w-md flex flex-col gap-4">
        <button class="w-full py-3.5 px-4 bg-primary text-white hover:bg-primary-hover font-extrabold rounded-2xl shadow-md transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2" onclick="openAddModal()">
            <span>+ Neues Rezept anlegen</span>
        </button>
        
        <div class="relative w-full">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
            <input type="text" class="search-box w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="searchBar" placeholder="Nach Rezepten oder Zutaten suchen..." oninput="renderList()">
        </div>

        <div class="filter-group flex gap-2 overflow-x-auto py-1 scrollbar-none" id="listFilters" style="scrollbar-width: none; -ms-overflow-style: none;">
            </div>
        
        <div class="flex flex-col gap-3" id="listContainer">
            </div>
    </div>

    <nav class="nav-tabs flex bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 fixed bottom-0 left-0 right-0 w-full z-[100] shadow-2xl justify-center">
        <div class="w-full max-w-md flex">
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 border-t-2 border-transparent text-slate-400 dark:text-slate-500 transition-all" id="tabHome" onclick="switchView('home')">
                <span class="text-lg">🏠</span>
                <span>Home</span>
            </button>
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 border-t-2 border-transparent text-slate-400 dark:text-slate-500 transition-all" id="tabGame" onclick="switchView('game')">
                <span class="text-lg">🃏</span>
                <span>Swipe</span>
            </button>
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 border-t-2 border-transparent text-slate-400 dark:text-slate-500 transition-all" id="tabList" onclick="switchView('list')">
                <span class="text-lg">📋</span>
                <span>Rezepte</span>
            </button>
        </div>
    </nav>

    <div class="modal fixed inset-0 bg-slate-950/60 dark:bg-slate-950/80 hidden items-center justify-center p-4 z-[200] backdrop-blur-sm transition-opacity duration-300" id="recipeModal">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl p-6 max-h-[85vh] overflow-y-auto custom-scrollbar border border-slate-100 dark:border-slate-800 scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-5 pb-2 border-b border-slate-100 dark:border-slate-800">
                <h3 id="modalTitle" class="text-lg font-extrabold text-slate-800 dark:text-white">Neues Rezept</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">✕</button>
            </div>
            
            <input type="hidden" id="formRecipeId">
            
            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Name des Gerichts *</label>
                <input type="text" id="formTitle" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="z.B. Schnelle Linsen-Bolognese" required>
            </div>
            
            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Ernährungsart *</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-700 dark:text-slate-300">
                        <input type="radio" name="formType" value="Vegetarisch" id="typeVeg" class="accent-primary w-4 h-4" required>
                        <span>Vegetarisch 🌱</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-700 dark:text-slate-300">
                        <input type="radio" name="formType" value="Fleisch" id="typeMeat" class="accent-primary w-4 h-4" required>
                        <span>Fleisch / Fisch 🍗</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Zubereitungszeit</label>
                <input type="text" id="formTime" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="z.B. 25 Min.">
            </div>
            
            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Foto (optional)</label>
                <div class="flex flex-col gap-2">
                    <input type="file" id="formImage" accept="image/*" class="text-xs text-slate-500 dark:text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-primary-light dark:file:bg-primary-dark file:text-primary hover:file:opacity-90 cursor-pointer" onchange="handleImageUpload(this)">
                    <div class="preview-wrapper hidden relative self-start" id="previewWrapper">
                        <img id="imgPreview" class="max-w-[120px] rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm" alt="Vorschau">
                        <button type="button" class="btn-remove-img absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow transition-all" onclick="removeFormImage()">✕</button>
                    </div>
                </div>
            </div>

            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Zutaten *</label>
                <div class="flex flex-col gap-2 mb-2" id="ingredientsListContainer"></div>
                <button type="button" class="py-2.5 px-4 bg-primary-light dark:bg-primary-dark/30 hover:bg-primary-light/80 text-primary dark:text-slate-200 font-bold rounded-xl text-xs flex items-center justify-center gap-1 border border-dashed border-primary transition-all" onclick="addListRow('ingredientsListContainer', '')">
                    + Zutat hinzufügen
                </button>
            </div>

            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Zubereitungsschritte *</label>
                <div class="flex flex-col gap-2 mb-2" id="stepsListContainer"></div>
                <button type="button" class="py-2.5 px-4 bg-primary-light dark:bg-primary-dark/30 hover:bg-primary-light/80 text-primary dark:text-slate-200 font-bold rounded-xl text-xs flex items-center justify-center gap-1 border border-dashed border-primary transition-all" onclick="addListRow('stepsListContainer', '')">
                    + Schritt hinzufügen
                </button>
            </div>

            <div class="form-group mb-4">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Tags / Kategorien (mit Komma trennen)</label>
                <input type="text" id="formTags" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="z.B. Pasta, Schnell, Abendessen">
            </div>
            
            <div class="form-group mb-6">
                <label class="block text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Nährwerte (optional)</label>
                <div class="grid grid-cols-3 gap-2">
                    <div class="flex flex-col">
                        <label for="nutCal" class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1">Kalorien</label>
                        <input type="number" id="nutCal" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-lg outline-none text-sm" placeholder="kcal">
                    </div>
                    <div class="flex flex-col">
                        <label for="nutProt" class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1">Protein</label>
                        <input type="number" id="nutProt" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-lg outline-none text-sm" placeholder="g">
                    </div>
                    <div class="flex flex-col">
                        <label for="nutCarb" class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1">Kohlenhydrate</label>
                        <input type="number" id="nutCarb" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-lg outline-none text-sm" placeholder="g">
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 justify-end pt-3 border-t border-slate-100 dark:border-slate-800">
                <button type="button" class="py-2.5 px-4 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-xl text-sm transition-all" onclick="closeModal()">Abbrechen</button>
                <button type="button" class="py-2.5 px-6 bg-primary hover:bg-primary-hover text-white font-bold rounded-xl text-sm transition-all shadow-md shadow-primary/20" onclick="saveRecipe()">Speichern</button>
            </div>
        </div>
    </div>

    <div class="modal fixed inset-0 bg-slate-950/60 dark:bg-slate-950/80 hidden items-center justify-center p-4 z-[250] backdrop-blur-sm transition-opacity duration-300" id="confirmModal">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl shadow-2xl p-6 border border-slate-100 dark:border-slate-800 scale-95 transition-transform duration-300">
            <div class="text-center">
                <span class="text-4xl inline-block mb-3">⚠️</span>
                <h3 class="text-lg font-extrabold text-slate-800 dark:text-white mb-2" id="confirmTitle">Rezept löschen?</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-6" id="confirmMessage">Möchtest du dieses Rezept wirklich dauerhaft entfernen?</p>
            </div>
            <div class="flex gap-3 justify-center">
                <button type="button" class="flex-1 py-2.5 px-4 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-xl text-sm transition-all" onclick="closeConfirmModal()">Abbrechen</button>
                <button type="button" class="flex-1 py-2.5 px-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl text-sm transition-all shadow-md shadow-red-500/20" id="confirmExecuteBtn">Löschen</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-3 bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-semibold text-xs rounded-full shadow-xl pointer-events-none opacity-0 translate-y-2 transition-all duration-300 z-[300] flex items-center gap-2"></div>

    <script>
        // Preset base recipes
        const PRESET_RECIPES = [
            { 
                id: 1, 
                title: "Klassische Carbonara", 
                type: "Fleisch", 
                time: "20 Min.", 
                image: null, 
                tags: ["Pasta", "Schnell"], 
                ingredients: ["200g Spaghetti", "100g Guanciale oder Speck", "2 frische Eigelb", "50g Pecorino Romano", "Viel frisch gemahlener Pfeffer"], 
                calories: 650, 
                protein: 28, 
                carbs: 72, 
                details: ["Nudeln in kochendem Salzwasser al dente zubereiten.", "Speck in einer breiten Pfanne knusprig auslassen.", "Frische Eigelbe mit fein geriebenem Käse und reichlich Pfeffer verrühren.", "Pasta direkt in die Pfanne zum Speck geben, vom Kochfeuer nehmen, Ei-Mischung mit 2-3 EL Nudelwasser cremig unterrühren."] 
            },
            { 
                id: 2, 
                title: "Tomaten Mozzarella Gnocchi", 
                type: "Vegetarisch", 
                time: "15 Min.", 
                image: null, 
                tags: ["Schnell", "Pfanne"], 
                ingredients: ["400g Gnocchi", "1 Packung Kirschtomaten", "1 Kugel Mozzarella", "Frischer Basilikum", "2 EL Olivenöl"], 
                calories: 480, 
                protein: 16, 
                carbs: 64, 
                details: ["Gnocchi in einer beschichteten Pfanne mit Olivenöl goldbraun braten.", "Halbierte Kirschtomaten hinzugeben und andünsten, bis sie leicht weich werden.", "Pfanne ausschalten, gewürfelten Mozzarella unterrühren und leicht anschmelzen lassen. Mit Basilikum dekorieren."] 
            },
            { 
                id: 3, 
                title: "Crispy Tofu Wokpfanne", 
                type: "Vegetarisch", 
                time: "25 Min.", 
                image: null, 
                tags: ["Asiatisch", "Gesund"], 
                ingredients: ["200g Naturtofu", "1 Brokkoli-Kopf", "1 rote Paprika", "3 EL Sojasauce", "1 EL Speisestärke", "Sesamöl"], 
                calories: 390, 
                protein: 22, 
                carbs: 35, 
                details: ["Tofu auspressen, in Würfel schneiden, mit Speisestärke bestäuben.", "In Sesamöl kross anbraten, dann aus dem Wok nehmen.", "Brokkoliröschen und Paprikastreifen anbraten, mit Sojasauce ablöschen. Tofu zurückgeben und vermengen."] 
            }
        ];

        // Core State
        let recipes = [];
        let activeDeck = [];
        let currentFilterTag = "Alle";
        let currentUploadedImage = null;
        let isFlipped = false;
        let currentServings = 2; // Default starting portions globally for current match

        // Interactive Swiping Variables
        let startX = 0, startY = 0, moveX = 0, moveY = 0;
        let startTime = 0;
        let isDragging = false;
        let activeCardEl = null;

        // Modal Action Pointer
        let pendingConfirmAction = null;

        // Initialize App on Load
        window.addEventListener('DOMContentLoaded', () => {
            // Load theme
            if (localStorage.getItem('dark-mode') === 'true' || 
                (!('dark-mode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').textContent = "☀️";
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').textContent = "🌙";
            }

            // Load from LocalStorage or populate preset
            const storedRecipes = localStorage.getItem('recipes');
            if (storedRecipes) {
                try {
                    recipes = JSON.parse(storedRecipes);
                } catch(e) {
                    recipes = [...PRESET_RECIPES];
                }
            } else {
                recipes = [...PRESET_RECIPES];
                saveToLocalStorage();
            }

            updateGlobalCounter();
            renderDashboard();
        });

        function saveToLocalStorage() {
            localStorage.setItem('recipes', JSON.stringify(recipes));
            updateGlobalCounter();
        }

        function updateGlobalCounter() {
            document.getElementById('global-counter').textContent = `${recipes.length} Rezepte`;
        }

        // --- NAVIGATION CONTROLLER ---
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-primary', 'dark:text-white', 'border-primary');
                b.classList.add('text-slate-400', 'dark:text-slate-500');
            });
            
            document.getElementById(view + 'View').classList.remove('hidden');
            const activeTab = document.getElementById('tab' + view.charAt(0).toUpperCase() + view.slice(1));
            activeTab.classList.add('text-primary', 'dark:text-white', 'border-primary');
            activeTab.classList.remove('text-slate-400', 'dark:text-slate-500');

            if (view === 'home') renderDashboard();
            if (view === 'game') startGame();
            if (view === 'list') { currentFilterTag = "Alle"; renderList(); }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('theme-icon').textContent = isDark ? "☀️" : "🌙";
            showToast(isDark ? "Dark Mode aktiviert" : "Light Mode aktiviert");
        }

        // Helper function to scale ingredient values based on portions (Assumes base recipes are calculated for 2 portions)
        function parseAndScaleIngredient(ingString, baseServings, targetServings) {
            if (baseServings === targetServings) return ingString;
            const factor = targetServings / baseServings;

            // Regex matches numbers, decimals (1.5 / 1,5), and fractions (1/2, 1/4, etc.)
            const numRegex = /^(\d+\/\d+|\d+[\.,]\d+|\d+)\s*/;
            const match = ingString.match(numRegex);

            if (!match) return ingString;

            const originalValueStr = match[1];
            let value = 0;

            if (originalValueStr.includes('/')) {
                const parts = originalValueStr.split('/');
                value = parseFloat(parts[0]) / parseFloat(parts[1]);
            } else {
                value = parseFloat(originalValueStr.replace(',', '.'));
            }

            let newQuantity = value * factor;
            // Format nicely: limit trailing digits, replace dot with comma
            let formattedQuantity = Number(newQuantity.toFixed(2)).toString().replace('.', ',');
            
            return ingString.replace(numRegex, `${formattedQuantity} `);
        }

        // Feature 3: Action to compile shopping list and forward to WhatsApp
        function shareToWhatsApp(recipeTitle, ingredientsList) {
            let message = `🛒 *EINKAUFSLISTE für ${currentServings} Portionen*\n`;
            message += `🍴 *Gericht:* ${recipeTitle}\n\n`;
            message += `*Zutaten:*\n`;
            
            ingredientsList.forEach(ing => {
                const scaled = parseAndScaleIngredient(ing, 2, currentServings);
                message += `☐ ${scaled}\n`;
            });
            
            message += `\n_Erstellt mit RecipeSwipe_ 🃏`;
            
            const encodedText = encodeURIComponent(message);
            window.open(`https://api.whatsapp.com/send?text=${encodedText}`, '_blank');
        }

        // Realtime servings changes
        function changeServings(change, recipeTitle, isWinnerCard = false) {
            const newServings = currentServings + change;
            if (newServings < 1) return;
            currentServings = newServings;

            // Update UI Counters
            document.querySelectorAll('.servings-count').forEach(el => el.textContent = currentServings);
            
            // Re-render the ingredient lists in place based on context
            if (isWinnerCard) {
                const winner = activeDeck[0];
                const listContainer = document.getElementById('winnerIngredientsList');
                if (listContainer) {
                    listContainer.innerHTML = winner.ingredients.map(i => `
                        <li class="border-b border-slate-100 dark:border-slate-800/50 py-2.5 last:border-none flex items-start gap-2.5">
                            <span class="text-emerald-500 font-bold text-sm mt-0.5">✔</span>
                            <span class="text-sm text-slate-700 dark:text-slate-300">${parseAndScaleIngredient(i, 2, currentServings)}</span>
                        </li>
                    `).join('');
                }
                
                // Update WhatsApp Button click handler parameter context dynamically
                const whatsappBtn = document.getElementById('whatsappBtn');
                if (whatsappBtn) {
                    whatsappBtn.onclick = () => shareToWhatsApp(winner.title, winner.ingredients);
                }
            } else {
                const currentRecipe = activeDeck[0];
                const listContainer = document.getElementById('gameIngredientsList');
                if (listContainer) {
                    listContainer.innerHTML = currentRecipe.ingredients.map(i => `
                        <li class="border-b border-slate-50 dark:border-slate-800/50 py-1.5 last:border-none flex items-start gap-1.5">
                            <span class="text-primary text-[10px] mt-1">✔</span>
                            <span>${parseAndScaleIngredient(i, 2, currentServings)}</span>
                        </li>
                    `).join('');
                }
            }
        }

            if (activeDeck.length === 0) return;

            // Keep only the current item as the sole item in the deck to trigger winner screen resolution

        // --- SWIPE GAME DECK CONTROLLER ---
        function startGame() {
            activeDeck = [...recipes].sort(() => 0.5 - Math.random());
            isFlipped = false;
            currentServings = 2; // Reset portions back to standard upon game launch
            renderGameCard();
        }

        function toggleFlip() {
            const cardBox = document.getElementById('activeCardBox');
            if (cardBox) {
                isFlipped = !isFlipped;
                cardBox.classList.toggle('flipped', isFlipped);
                const isRotated = cardBox.classList.contains('flipped');
                
                // Animate rotating effect using CSS transform property directly in style for stability
                const currentXTranslation = isDragging ? moveX : 0;
                const currentYTranslation = isDragging ? moveY : 0;
                const currentZRotation = isDragging ? (moveX / 15) : 0;
                
                cardBox.style.transform = `translateX(${currentXTranslation}px) translateY(${currentYTranslation}px) rotateZ(${currentZRotation}deg) rotateY(${isRotated ? 180 : 0}deg)`;
            }
        }

        function renderGameCard() {
            const container = document.getElementById('deckContainer');
            const statusText = document.getElementById('gameStatus');
            const controls = document.getElementById('gameControls');
            const gameView = document.getElementById('gameView');
            container.innerHTML = '';
            isFlipped = false;

            if (recipes.length === 0) {
                gameView.classList.remove('max-w-2xl');
                gameView.classList.add('max-w-md');
                container.style.height = '400px';

                container.innerHTML = `

                        <button class="py-2.5 px-5 bg-primary hover:bg-primary-hover text-white text-xs font-bold rounded-xl transition-all shadow-md shadow-primary/20" onclick="switchView('list')">Rezept hinzufügen</button>
                    </div>
                `;

                gameView.classList.add('max-w-2xl'); // Erweitern auf zwei Spalten für viel Platz

            cardBox.id = 'activeCardBox';
            cardBox.innerHTML = createCardFaceHTML(r, false);
            
            // Attach mouse gestures
            cardBox.addEventListener('mousedown', startDrag);
            cardBox.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', endDrag);

            // Attach touch gestures
            cardBox.addEventListener('touchstart', startDrag, { passive: true });
            cardBox.addEventListener('touchmove', drag, { passive: false });
            window.addEventListener('touchend', endDrag);

            container.appendChild(cardBox);
            activeCardEl = cardBox;
        }

                            <button onclick="event.stopPropagation(); changeServings(-1, '${recipe.title.replace(/'/g, "\\'")}', false)" class="w-6 h-6 rounded bg-white dark:bg-slate-700 border border-slate-200 shadow-sm font-extrabold text-xs flex items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-slate-50">-</button>
                            <span class="text-xs font-black text-slate-800 dark:text-white"><span class="servings-count">${currentServings}</span> Pers.</span>
                            <button onclick="event.stopPropagation(); changeServings(1, '${recipe.title.replace(/'/g, "\\'")}', false)" class="w-6 h-6 rounded bg-white dark:bg-slate-700 border border-slate-200 shadow-sm font-extrabold text-xs flex items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-slate-50">+</button>
                        </div>
                    </div>

                    <div class="section-label text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1">Zutaten:</div>
                    <div class="content-scroll flex-grow overflow-y-auto custom-scrollbar text-sm text-slate-600 dark:text-slate-300 pr-1 select-text">
                        <ul id="gameIngredientsList" class="list-none">${ingredientsHtml}</ul>
                    </div>
                    ${!isWinner ? '<div class="flip-hint text-center text-[10px] font-bold text-slate-400 dark:text-slate-500 border-t border-dashed border-slate-100 dark:border-slate-800 pt-2 mt-2">💡 Tippen zum Umdrehen</div>' : ''}
                </div>
            `;

            let back = isWinner ? '' : `
                <div class="card-face back absolute inset-0 bg-slate-50 dark:bg-slate-900 border border-slate-150 dark:border-slate-800 rounded-[28px] shadow-card px-5 py-5 flex flex-col backface-hidden rotate-y-180 overflow-hidden">
                    <div class="card-header-area flex justify-between items-start gap-2 mb-2">
                        <h3 class="card-title text-sm font-black tracking-tight text-slate-500 dark:text-slate-400 line-clamp-1">${recipe.title} (Zubereitung)</h3>
                    </div>
                    <div class="section-label text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Anleitung:</div>
                    <div class="content-scroll flex-grow overflow-y-auto custom-scrollbar pr-1 select-text">
                        <div class="flex flex-col">${stepsHtml}</div>
                    </div>
                    <div class="section-label text-[10px] font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-3 mb-1">Nährwerte (ca.):</div>
                    ${nutrientHtml}
                    <div class="flip-hint text-center text-[10px] font-bold text-slate-400 dark:text-slate-500 border-t border-dashed border-slate-200 dark:border-slate-800 pt-2 mt-2">💡 Tippen zum Zurückdrehen</div>
                </div>
            `;

            return front + back;
        }

        // --- INTERACTION PHYSICS & SWIPING LOGIC ---
        function startDrag(e) {
            if (activeDeck.length <= 1) return;
            // Prevent drag firing if interactive items like counter buttons are hit
            if (e.target.closest('button') || e.target.closest('.servings-count')) return;
            
            isDragging = true;
            startTime = Date.now();
            activeCardEl.style.transition = 'none';
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            moveX = 0; moveY = 0;
        }

        function drag(e) {
            if (!isDragging) return;
            let currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            moveX = currentX - startX;
            moveY = currentY - startY;

            if (Math.abs(moveX) > 10 && e.cancelable) e.preventDefault();

            let rotation = moveX / 15;
            let currentYRot = isFlipped ? 180 : 0;
            activeCardEl.style.transform = `translateX(${moveX}px) translateY(${moveY}px) rotateZ(${rotation}deg) rotateY(${currentYRot}deg)`;

            // Visual feedback glow on drag direction
            const glowKeep = activeCardEl.querySelector('#glow-behalten');
            const glowDiscard = activeCardEl.querySelector('#glow-raus');
            if (glowKeep && glowDiscard) {
                if (moveX > 30) {
                    glowKeep.style.opacity = Math.min(1, (moveX - 30) / 100);
                    glowDiscard.style.opacity = 0;
                } else if (moveX < -30) {
                    glowDiscard.style.opacity = Math.min(1, (-moveX - 30) / 100);
                    glowKeep.style.opacity = 0;
                } else {
                    glowKeep.style.opacity = 0;
                    glowDiscard.style.opacity = 0;
                }
            }
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Clean glow overlays
            const glowKeep = activeCardEl.querySelector('#glow-behalten');
            const glowDiscard = activeCardEl.querySelector('#glow-raus');
            if (glowKeep) glowKeep.style.opacity = 0;
            if (glowDiscard) glowDiscard.style.opacity = 0;

            activeCardEl.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            let duration = Date.now() - startTime;

            // Simple tap check
            if (Math.abs(moveX) < 12 && Math.abs(moveY) < 12 && duration < 250) {
                toggleFlip();
                return;
            }

            if (moveX > 140) { 
                handleSwipeResolution('right'); 
            } else if (moveX < -140) { 
                handleSwipeResolution('left'); 
            } else {
                // Reset card position smoothly
                let currentYRot = isFlipped ? 180 : 0;
                activeCardEl.style.transform = `rotateY(${currentYRot}deg)`;
            }
        }

        function animateSwipe(direction) {
            if (activeDeck.length <= 1) return;
            if (!activeCardEl) return;
            
            activeCardEl.style.transition = 'transform 0.35s ease-out, opacity 0.35s';
            let currentYRot = isFlipped ? 180 : 0;
            
            if (direction === 'right') {
                activeCardEl.style.transform = `translateX(180%) rotate(25deg) rotateY(${currentYRot}deg)`;
            } else {
                activeCardEl.style.transform = `translateX(-180%) rotate(-25deg) rotateY(${currentYRot}deg)`;
            }
            activeCardEl.style.opacity = '0';
            setTimeout(() => handleSwipeResolution(direction), 250);
        }

        function handleSwipeResolution(direction) {
            if (direction === 'right') {
                let kept = activeDeck.shift();
                activeDeck.push(kept); // Pushes it back into the rotation deck
                showToast(`♥ "${kept.title}" behalten`);
            } else { 
                let removed = activeDeck.shift();
                showToast(`✕ "${removed.title}" aussortiert`);
            }
            renderGameCard();
        }

        // --- RECIPE LISTS, SEARCHES, & TAG FILTERS ---
        function renderList() {
            const container = document.getElementById('listContainer');
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            container.innerHTML = '';
            renderFilterBar();

            let filtered = recipes.filter(r => {
                let searchString = r.title + " " + (Array.isArray(r.ingredients) ? r.ingredients.join(" ") : r.ingredients);
                let matchesSearch = searchString.toLowerCase().includes(searchVal);
                let matchesTag = (currentFilterTag === "Alle") || (r.type === currentFilterTag) || (r.tags && r.tags.includes(currentFilterTag));
                return matchesSearch && matchesTag;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-slate-400 dark:text-slate-500 bg-white dark:bg-slate-900 rounded-3xl border border-dashed border-slate-200 dark:border-slate-800 text-xs">
                        Keine Rezepte gefunden.
                    </div>
                `;
                return;
            }

            filtered.forEach(recipe => {
                const div = document.createElement('div');
                div.className = 'list-item bg-white dark:bg-slate-900 p-3 rounded-2xl flex items-center gap-3 shadow-premium border border-slate-100 dark:border-slate-800/80 hover:scale-[1.005] transition-all';
                let imgHtml = recipe.image 
                    ? `<img src="${recipe.image}" class="list-img w-14 h-14 rounded-xl object-cover shadow-sm flex-shrink-0 bg-slate-50 dark:bg-slate-800">` 
                    : `<div class="list-img w-14 h-14 rounded-xl bg-gradient-to-br from-primary/5 to-rose-100/10 dark:from-slate-800 dark:to-slate-950 flex items-center justify-center text-2xl shadow-sm flex-shrink-0">🍽️</div>`;
                
                div.innerHTML = `
                    ${imgHtml}
                    <div class="flex-grow">
                        <div class="list-title font-bold text-sm text-slate-800 dark:text-white line-clamp-1">${recipe.title}</div>
                        <div class="flex gap-1.5 items-center mt-1 text-[10px] text-slate-400 dark:text-slate-500">
                            <span class="font-extrabold uppercase text-[9px]">${recipe.type}</span>
                            <span>•</span>
                            <span>${recipe.time ? recipe.time : 'keine Zeitangabe'}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <button class="p-2.5 rounded-lg bg-slate-50 hover:bg-slate-100 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-300 transition-all text-xs" onclick="openEditModal(${recipe.id})" title="Rezept bearbeiten">✏️</button>
                        <button class="p-2.5 rounded-lg bg-rose-50 hover:bg-rose-100 dark:bg-rose-950/20 text-rose-500 dark:text-rose-400 transition-all text-xs" onclick="triggerDelete(${recipe.id})" title="Rezept löschen">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderFilterBar() {
            const bar = document.getElementById('listFilters');
            bar.innerHTML = '';
            let baseTags = ["Alle", "Vegetarisch", "Fleisch"];
            
            recipes.forEach(r => { 
                if(r.tags) r.tags.forEach(t => { 
                    if(!baseTags.includes(t)) baseTags.push(t); 
                })
            });

            baseTags.forEach(tag => {
                const btn = document.createElement('button');
                const isActive = currentFilterTag === tag;
                btn.className = `filter-tag px-4 py-2 rounded-full font-bold text-xs shadow-sm border transition-all flex-shrink-0 ${
                    isActive 
                        ? 'bg-primary border-primary text-white' 
                        : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50'
                }`;
                btn.textContent = tag;
                btn.onclick = () => { currentFilterTag = tag; renderList(); };
                bar.appendChild(btn);
            });
        }

        // --- MANAGING DYNAMIC ROWS INSIDE MODAL (ADD / REMOVE / ORDER) ---
        function addListRow(containerId, value = '') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'dynamic-item flex gap-1.5 items-center w-full';
            
            let placeholderText = containerId === 'ingredientsListContainer' ? 'z.B. 200g Mehl' : 'z.B. Pasta in Salzwasser kochen.';
            
            div.innerHTML = `
                <button type="button" class="btn-list-action w-7 h-7 flex items-center justify-center bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 text-[9px] transition-all" onclick="moveRow(this, -1)" title="Nach oben">▲</button>
                <button type="button" class="btn-list-action w-7 h-7 flex items-center justify-center bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 text-[9px] transition-all" onclick="moveRow(this, 1)" title="Nach unten">▼</button>
                <input type="text" class="list-input-field flex-grow px-3 py-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl text-xs focus:ring-1 focus:ring-primary focus:border-transparent outline-none transition-all" value="${value.replace(/"/g, '&quot;')}" placeholder="${placeholderText}">
                <button type="button" class="btn-list-action delete w-7 h-7 flex items-center justify-center bg-rose-50 dark:bg-rose-950/20 text-rose-500 dark:text-rose-400 rounded-lg text-xs hover:bg-rose-100 transition-all" onclick="this.parentElement.remove()" title="Löschen">✕</button>
            `;
            container.appendChild(div);
        }

        function moveRow(button, direction) {
            const item = button.parentElement;
            const container = item.parentElement;
            if (direction === -1 && item.previousElementSibling) {
                container.insertBefore(item, item.previousElementSibling);
            } else if (direction === 1 && item.nextElementSibling) {
                container.insertBefore(item.nextElementSibling, item);
            }
        }

        function getDynamicListValues(containerId) {
            const container = document.getElementById(containerId);
            const inputs = container.querySelectorAll('.list-input-field');
            let values = [];
            inputs.forEach(input => { 
                if(input.value.trim() !== '') values.push(input.value.trim()); 
            });
            return values;
        }

        function populateDynamicList(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (Array.isArray(data)) {
                data.forEach(val => addListRow(containerId, val));
            } else if (typeof data === 'string' && data.trim() !== '') {
                // Backward compatibility for legacy flat String representations
                let splitChar = data.includes('\n') ? '\n' : ',';
                data.split(splitChar).forEach(val => {
                    let clean = val.replace(/^[-•\d+\.\s]*/, '').trim();
                    if(clean) addListRow(containerId, clean);
                });
            }
            
            // Add at least one empty row to ensure intuitive UX
            if (container.children.length === 0) {
                addListRow(containerId, '');
            }
        }

        // --- IMAGE ATTACHMENT UPLOAD MECHANISM ---
        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            // Enforce realistic bounds
            if (file.size > 2 * 1024 * 1024) {
                showToast("Das Bild darf maximal 2MB groß sein.");
                input.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                currentUploadedImage = e.target.result;
                const wrapper = document.getElementById('previewWrapper');
                const preview = document.getElementById('imgPreview');
                preview.src = currentUploadedImage;
                wrapper.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeFormImage() {
            currentUploadedImage = null;
            document.getElementById('formImage').value = "";
            document.getElementById('previewWrapper').classList.add('hidden');
        }

        // --- MODAL DIALOGS AND SAVE PIPELINES ---
        function openAddModal() {
            document.getElementById('modalTitle').textContent = "Neues Rezept";
            document.getElementById('formRecipeId').value = "";
            document.getElementById('formTitle').value = "";
            document.getElementById('formTime').value = "";
            document.getElementById('formTags').value = "";
            
            document.getElementById('typeVeg').checked = false;
            document.getElementById('typeMeat').checked = false;
            
            document.getElementById('nutCal').value = "";
            document.getElementById('nutProt').value = "";
            document.getElementById('nutCarb').value = "";
            
            removeFormImage();
            
            populateDynamicList('ingredientsListContainer', []);
            populateDynamicList('stepsListContainer', []);
            
            openModalWindow();
        }

        function openEditModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            document.getElementById('modalTitle').textContent = "Rezept bearbeiten";
            document.getElementById('formRecipeId').value = recipe.id;
            document.getElementById('formTitle').value = recipe.title;
            document.getElementById('formTime').value = recipe.time || "";
            document.getElementById('formTags').value = recipe.tags ? recipe.tags.join(', ') : "";

            if (recipe.type === "Vegetarisch") {
                document.getElementById('typeVeg').checked = true;
            } else {
                document.getElementById('typeMeat').checked = true;
            }

            document.getElementById('nutCal').value = recipe.calories || "";
            document.getElementById('nutProt').value = recipe.protein || "";
            document.getElementById('nutCarb').value = recipe.carbs || "";

            currentUploadedImage = recipe.image;
            if (recipe.image) {
                const wrapper = document.getElementById('previewWrapper');
                const preview = document.getElementById('imgPreview');
                preview.src = recipe.image;
                wrapper.classList.remove('hidden');
            } else {
                removeFormImage();
            }

            populateDynamicList('ingredientsListContainer', recipe.ingredients || []);
            populateDynamicList('stepsListContainer', recipe.details || []);

            openModalWindow();
        }

        function openModalWindow() {
            const modal = document.getElementById('recipeModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Micro-animation scale
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95');
                modal.querySelector('.modal-content').classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('recipeModal');
            modal.querySelector('.modal-content').classList.add('scale-95');
            modal.querySelector('.modal-content').classList.remove('scale-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 150);
        }

        function saveRecipe() {
            const titleInput = document.getElementById('formTitle').value.trim();
            const typeInput = document.querySelector('input[name="formType"]:checked');
            const timeInput = document.getElementById('formTime').value.trim();
            const tagsInput = document.getElementById('formTags').value.trim();
            
            const ingredients = getDynamicListValues('ingredientsListContainer');
            const details = getDynamicListValues('stepsListContainer');

            // Custom Dialog/Message Validation instead of raw alert()
            if (!titleInput) {
                showToast("Bitte einen Rezeptnamen angeben.");
                return;
            }
            if (!typeInput) {
                showToast("Bitte wähle eine Ernährungsart aus.");
                return;
            }
            if (ingredients.length === 0) {
                showToast("Bitte füge mindestens eine Zutat hinzu.");
                return;
            }
            if (details.length === 0) {
                showToast("Bitte füge mindestens einen Zubereitungsschritt hinzu.");
                return;
            }

            // Optional tags parsing
            let tags = [];
            if (tagsInput) {
                tags = tagsInput.split(',').map(t => t.trim()).filter(t => t !== "");
            }

            const rId = document.getElementById('formRecipeId').value;
            const updatedRecipe = {
                id: rId ? parseInt(rId) : Date.now(),
                title: titleInput,
                type: typeInput.value,
                time: timeInput,
                image: currentUploadedImage,
                tags: tags,
                ingredients: ingredients,
                details: details,
                calories: parseInt(document.getElementById('nutCal').value) || null,
                protein: parseInt(document.getElementById('nutProt').value) || null,
                carbs: parseInt(document.getElementById('nutCarb').value) || null
            };

            if (rId) {
                // Update existent
                const index = recipes.findIndex(r => r.id === parseInt(rId));
                if (index !== -1) recipes[index] = updatedRecipe;
                showToast(`Rezept "${titleInput}" aktualisiert!`);
            } else {
                // Add new
                recipes.unshift(updatedRecipe);
                showToast(`Rezept "${titleInput}" hinzugefügt!`);
            }

            saveToLocalStorage();
            closeModal();
            renderList();
        }

        // --- CUSTOM CONFIRMATION DIALOG DIALOGS ---
        function triggerDelete(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;

            document.getElementById('confirmTitle').textContent = "Rezept löschen?";
            document.getElementById('confirmMessage').innerHTML = `Möchtest du das Rezept <strong>"${recipe.title}"</strong> wirklich unwiderruflich löschen?`;
            
            pendingConfirmAction = () => {
                recipes = recipes.filter(r => r.id !== id);
                saveToLocalStorage();
                renderList();
                showToast(`"${recipe.title}" gelöscht.`);
            };

            openConfirmModal();
        }

        function openConfirmModal() {
            const modal = document.getElementById('confirmModal');
            const btn = document.getElementById('confirmExecuteBtn');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            btn.onclick = () => {
                if (pendingConfirmAction) pendingConfirmAction();
                closeConfirmModal();
            };

            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95');
                modal.querySelector('.modal-content').classList.add('scale-100');
            }, 10);
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            modal.querySelector('.modal-content').classList.add('scale-95');
            modal.querySelector('.modal-content').classList.remove('scale-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                pendingConfirmAction = null;
            }, 150);
        }

        // Helper toast component
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `💬 <span>${message}</span>`;
            toast.classList.remove('opacity-0', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }
    </script>
</body>
</html>
