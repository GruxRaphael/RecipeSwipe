<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecipeSwipe – Das interaktive Live-Kochbuch</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RecipeSwipe">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: {
                            DEFAULT: '#ff5a5f',
                            hover: '#e04e52',
                            light: '#fff0f0',
                            dark: '#3d1617'
                        }
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 12px -2px rgba(0, 0, 0, 0.03)',
                        'card': '0 20px 40px -10px rgba(0, 0, 0, 0.12)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; transition: background-color 0.3s, color 0.3s; }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 9999px; }
        .interactive-card { touch-action: none; user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-24 px-4 overflow-x-hidden">

    <header class="w-full max-w-md flex justify-between items-center py-4 mb-2 z-50">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🃏</span>
            <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-primary to-rose-600 bg-clip-text text-transparent">RecipeSwipe</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 transition-all">
                <span id="theme-icon">🌙</span>
            </button>
            <span class="text-xs bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full font-bold shadow-sm text-slate-600 dark:text-slate-300" id="global-counter">Lade Cloud...</span>
        </div>
    </header>

    <div id="homeView" class="view-section active w-full max-w-md flex flex-col gap-6">
        <div class="bg-gradient-to-br from-white to-slate-50 dark:from-slate-800 dark:to-slate-900 p-6 rounded-3xl shadow-premium border border-slate-100 dark:border-slate-800 text-center relative overflow-hidden group">
            <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-2">Was kochen wir heute?</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-5">Wische spielerisch durch eure gemeinsamen Rezepte.<br>Links = Raus • Rechts = Behalten!</p>
            <button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-rose-500 text-white font-bold rounded-2xl shadow-lg transform active:translate-y-0.5 transition-all flex items-center justify-center gap-2" onclick="switchView('game')">
                <span>Auswahlrunde starten 🃏</span>
            </button>
        </div>

        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-extrabold text-slate-800 dark:text-white">Frische Vorschläge aus der Cloud</h3>
                <button onclick="renderDashboard()" class="text-xs font-semibold text-primary flex items-center gap-1">🔄</button>
            </div>
            <div class="flex flex-col gap-3" id="dashboardSuggestions"></div>
        </div>
    </div>

    <div id="gameView" class="view-section hidden w-full max-w-md flex flex-col gap-4">
        <div class="flex justify-between items-center px-2">
            <div class="text-sm font-extrabold text-primary" id="gameStatus">Bereitmachen...</div>
            <button onclick="startGame()" class="text-xs font-bold text-slate-500 dark:text-slate-400 flex items-center gap-1">🔀 Stapel mischen</button>
        </div>
        <div class="deck-container relative w-full h-[520px] my-1 flex justify-center perspective-1000 select-none" id="deckContainer"></div>
        <div class="game-controls flex justify-center items-center gap-4 w-full px-4 mt-2" id="gameControls"></div>
    </div>

    <div id="listView" class="view-section hidden w-full max-w-md flex flex-col gap-4">
        <button class="w-full py-3.5 px-4 bg-primary text-white hover:bg-primary-hover font-extrabold rounded-2xl shadow-md transition-all flex items-center justify-center gap-2" onclick="openAddModal()">
            <span>+ Neues Rezept hinzufügen</span>
        </button>
        
        <div class="relative w-full">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
            <input type="text" class="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-primary" id="searchBar" placeholder="Suchen..." oninput="renderList()">
        </div>

        <div class="flex gap-2 overflow-x-auto py-1" id="listFilters" style="scrollbar-width: none;"></div>
        <div class="flex flex-col gap-3" id="listContainer"></div>
    </div>

    <nav class="flex bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-100 dark:border-slate-800 fixed bottom-0 left-0 right-0 w-full z-[100] shadow-2xl justify-center">
        <div class="w-full max-w-md flex">
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 text-slate-400" id="tabHome" onclick="switchView('home')"><span>🏠</span><span>Home</span></button>
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 text-slate-400" id="tabGame" onclick="switchView('game')"><span>🃏</span><span>Swipe</span></button>
            <button class="tab-btn flex-1 py-4 text-center font-bold text-xs flex flex-col items-center gap-1 text-slate-400" id="tabList" onclick="switchView('list')"><span>📋</span><span>Rezepte</span></button>
        </div>
    </nav>

    <div class="modal fixed inset-0 bg-slate-950/60 hidden items-center justify-center p-4 z-[200] backdrop-blur-sm" id="recipeModal">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-6 max-h-[85vh] overflow-y-auto custom-scrollbar border border-slate-100 dark:border-slate-800 transition-transform duration-300">
            <div class="flex justify-between items-center mb-5 pb-2 border-b border-slate-100 dark:border-slate-800">
                <h3 id="modalTitle" class="text-lg font-extrabold text-slate-800 dark:text-white">Neues Rezept</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1">✕</button>
            </div>
            
            <input type="hidden" id="formRecipeId">
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Name des Gerichts *</label>
                <input type="text" id="formTitle" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl outline-none" placeholder="z.B. Linsen-Bolognese" required>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Ernährungsart *</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="formType" value="Vegetarisch" id="typeVeg" class="accent-primary"> <span>Vegetarisch 🌱</span></label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="formType" value="Fleisch" id="typeMeat" class="accent-primary"> <span>Fleisch / Fisch 🍗</span></label>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Zubereitungszeit</label>
                <input type="text" id="formTime" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl outline-none" placeholder="z.B. 25 Min.">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Foto (optional)</label>
                <input type="file" id="formImage" accept="image/*" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-primary-light file:text-primary cursor-pointer" onchange="handleImageUpload(this)">
                <div class="preview-wrapper hidden relative mt-2" id="previewWrapper">
                    <img id="imgPreview" class="max-w-[120px] rounded-2xl border" alt="Vorschau">
                    <button type="button" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs font-bold" onclick="removeFormImage()">✕</button>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Zutaten *</label>
                <div id="ingredientsListContainer" class="flex flex-col gap-2 mb-2"></div>
                <button type="button" class="w-full py-2 bg-slate-50 dark:bg-slate-800 text-primary font-bold rounded-xl text-xs border border-dashed border-primary" onclick="addListRow('ingredientsListContainer', '')">+ Zutat hinzufügen</button>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Zubereitungsschritte *</label>
                <div id="stepsListContainer" class="flex flex-col gap-2 mb-2"></div>
                <button type="button" class="w-full py-2 bg-slate-50 dark:bg-slate-800 text-primary font-bold rounded-xl text-xs border border-dashed border-primary" onclick="addListRow('stepsListContainer', '')">+ Schritt hinzufügen</button>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-extrabold text-slate-500 uppercase mb-2">Tags (mit Komma trennen)</label>
                <input type="text" id="formTags" class="w-full px-4 py-3 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white rounded-xl outline-none" placeholder="z.B. Pasta, Schnell">
            </div>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Kcal</label><input type="number" id="nutCal" class="w-full p-2 border dark:border-slate-700 dark:bg-slate-800 rounded-lg text-sm"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Protein</label><input type="number" id="nutProt" class="w-full p-2 border dark:border-slate-700 dark:bg-slate-800 rounded-lg text-sm"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Kohlenhydrate</label><input type="number" id="nutCarb" class="w-full p-2 border dark:border-slate-700 dark:bg-slate-800 rounded-lg text-sm"></div>
            </div>
            <div class="flex gap-3 justify-end pt-3 border-t dark:border-slate-800">
                <button type="button" class="py-2 px-4 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold rounded-xl text-sm" onclick="closeModal()">Abbrechen</button>
                <button type="button" class="py-2 px-6 bg-primary text-white font-bold rounded-xl text-sm shadow-md" onclick="saveRecipe()">Speichern</button>
            </div>
        </div>
    </div>

    <div class="modal fixed inset-0 bg-slate-950/60 hidden items-center justify-center p-4 z-[250] backdrop-blur-sm" id="confirmModal">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-6 text-center">
            <span class="text-4xl inline-block mb-3">⚠️</span>
            <h3 class="text-lg font-extrabold text-slate-800 dark:text-white mb-2">Rezept löschen?</h3>
            <p class="text-sm text-slate-500 mb-6" id="confirmMessage"></p>
            <div class="flex gap-3">
                <button class="flex-1 py-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm font-bold" onclick="closeConfirmModal()">Abbrechen</button>
                <button class="flex-1 py-2 bg-red-500 text-white rounded-xl text-sm font-bold" id="confirmExecuteBtn">Löschen</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-3 bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-semibold text-xs rounded-full shadow-xl opacity-0 transition-all duration-300 z-[300]"></div>

    <script>
        const SUPABASE_URL = "https://pbfzbhlfoildmecjbupl.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiZnpiaGxmb2lsZG1lY2pidXBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDM4NTEsImV4cCI6MjA5OTA3OTg1MX0.n3ePJpno76Cr7SQYwhc6TgUDNFvtFh3UYBvQxUxW3CI"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let recipes = [];
        let activeDeck = [];
        let currentFilterTag = "Alle";
        let currentUploadedImage = null;
        let isFlipped = false;
        let currentServings = 2;

        let startX = 0, startY = 0, moveX = 0, moveY = 0, startTime = 0, isDragging = false, activeCardEl = null;
        let pendingConfirmAction = null;

        window.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('dark-mode') === 'true') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').textContent = "☀️";
            }
            
            await loadRecipesFromCloud();

            supabaseClient
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'recipes' }, async () => {
                    await loadRecipesFromCloud();
                })
                .subscribe();
        });

        async function loadRecipesFromCloud() {
            const { data, error } = await supabaseClient
                .from('recipes')
                .select('*')
                .order('title', { ascending: true });

            if (error) {
                showToast("Fehler beim Cloud-Laden 😢");
            } else {
                recipes = data || [];
                document.getElementById('global-counter').textContent = `${recipes.length} Rezepte`;
                renderDashboard();
                if (!document.getElementById('listView').classList.contains('hidden')) renderList();
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('theme-icon').textContent = isDark ? "☀️" : "🌙";
        }

        function parseAndScaleIngredient(ingString, baseServings, targetServings) {
            if (baseServings === targetServings) return ingString;
            const factor = targetServings / baseServings;
            const numRegex = /^(\d+\/\d+|\d+[\.,]\d+|\d+)\s*/;
            const match = ingString.match(numRegex);
            if (!match) return ingString;
            const originalValueStr = match[1];
            let value = 0;
            if (originalValueStr.includes('/')) {
                const parts = originalValueStr.split('/');
                value = parseFloat(parts[0]) / parseFloat(parts[1]);
            } else {
                value = parseFloat(originalValueStr.replace(',', '.'));
            }
            return ingString.replace(numRegex, `${Number((value * factor).toFixed(2)).toString().replace('.', ',')} `);
        }

        function shareToWhatsApp(recipeTitle, ingredientsList) {
            let message = `🛒 *EINKAUFSLISTE für ${currentServings} Portionen*\n🍴 *Gericht:* ${recipeTitle}\n\n*Zutaten:*\n`;
            ingredientsList.forEach(ing => message += `☐ ${parseAndScaleIngredient(ing, 2, currentServings)}\n`);
            message += `\n_Erstellt mit RecipeSwipe_ 🃏`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
        }

        function changeServings(change, recipeTitle, isWinnerCard = false) {
            if (currentServings + change < 1) return;
            currentServings += change;
            document.querySelectorAll('.servings-count').forEach(el => el.textContent = currentServings);
            
            if (isWinnerCard) {
                document.getElementById('winnerIngredientsList').innerHTML = activeDeck[0].ingredients.map(i => `
                    <li class="border-b dark:border-slate-800/50 py-2.5 last:border-none flex items-start gap-2.5">
                        <span class="text-emerald-500 font-bold text-sm mt-0.5">✔</span>
                        <span class="text-sm text-slate-700 dark:text-slate-300">${parseAndScaleIngredient(i, 2, currentServings)}</span>
                    </li>
                `).join('');
            } else {
                document.getElementById('gameIngredientsList').innerHTML = activeDeck[0].ingredients.map(i => `
                    <li class="border-b dark:border-slate-800/50 py-1.5 last:border-none flex items-start gap-1.5"><span class="text-primary text-[10px] mt-1">✔</span><span>${parseAndScaleIngredient(i, 2, currentServings)}</span></li>
                `).join('');
            }
        }

        function forceInstantWin() {
            if (activeDeck.length === 0) return;
            activeDeck = [activeDeck[0]];
            renderGameCard();
        }

        function createWinnerCardHTML(recipe) {
            let imgHtml = recipe.image ? `<div class="w-full h-56 rounded-2xl overflow-hidden shadow-md"><img src="${recipe.image}" class="w-full h-full object-cover"></div>` : `<div class="w-full h-32 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-5xl">🍽️</div>`;
            return `
                <div class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[32px] shadow-premium p-6 flex flex-col gap-5">
                    <div class="text-center">
                        <span class="text-xs bg-amber-500/10 text-amber-500 px-3 py-1 rounded-full font-black uppercase">🏆 Heute wird gekocht!</span>
                        <h2 class="text-2xl font-black text-slate-800 dark:text-white mt-3">${recipe.title}</h2>
                    </div>
                    ${imgHtml}
                    <div class="flex flex-wrap gap-2 justify-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${recipe.type === 'Vegetarisch' ? 'bg-teal-50 text-teal-600' : 'bg-rose-50 text-rose-600'}">${recipe.type}</span>
                        ${recipe.time ? `<span class="bg-sky-50 text-sky-600 px-3 py-1 rounded-full text-xs font-bold">⏱️ ${recipe.time}</span>` : ''}
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl">
                        <span class="text-xs font-bold text-slate-500">Portionsrechner</span>
                        <div class="flex items-center gap-3">
                            <button onclick="changeServings(-1, '', true)" class="w-8 h-8 rounded-xl bg-white dark:bg-slate-700 shadow-sm font-bold text-sm">-</button>
                            <span class="text-sm font-black"><span class="servings-count">${currentServings}</span> Pers.</span>
                            <button onclick="changeServings(1, '', true)" class="w-8 h-8 rounded-xl bg-white dark:bg-slate-700 shadow-sm font-bold text-sm">+</button>
                        </div>
                    </div>
                    <button class="w-full py-3 bg-emerald-500 text-white font-extrabold rounded-2xl shadow-md" onclick="shareToWhatsApp('${recipe.title.replace(/'/g, "\\'")}', ${JSON.stringify(recipe.ingredients).replace(/"/g, '&quot;')})">🛒 Zutaten per WhatsApp senden</button>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-wider mb-2 border-b pb-1 text-slate-400">Zutaten</h3>
                        <ul id="winnerIngredientsList">${recipe.ingredients.map(i => `<li class="py-1 text-sm text-slate-600 dark:text-slate-300">✔ ${parseAndScaleIngredient(i, 2, currentServings)}</li>`).join('')}</ul>
                    </div>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-wider mb-2 border-b pb-1 text-slate-400">Zubereitung</h3>
                        <div>${recipe.details.map((s, idx) => `<p class="text-sm mb-2 text-slate-600 dark:text-slate-300"><strong>${idx+1}.</strong> ${s}</p>`).join('')}</div>
                    </div>
                </div>
            `;
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(view + 'View').classList.remove('hidden');
            if (view === 'home') renderDashboard();
            if (view === 'game') startGame();
            if (view === 'list') { currentFilterTag = "Alle"; renderList(); }
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardSuggestions');
            container.innerHTML = '';
            if (recipes.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-xs text-slate-400">Noch keine Rezepte in der Cloud.</div>`;
                return;
            }
            [...recipes].sort(() => 0.5 - Math.random()).slice(0, 3).forEach(r => {
                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-slate-900 p-4 rounded-2xl flex gap-4 items-center shadow-sm border dark:border-slate-800 cursor-pointer';
                div.onclick = () => { switchView('list'); document.getElementById('searchBar').value = r.title; renderList(); };
                div.innerHTML = `<div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-xl flex-shrink-0">🍽️</div><div class="flex-grow"><h4 class="font-bold text-sm">${r.title}</h4></div><span class="text-slate-300">➔</span>`;
                container.appendChild(div);
            });
        }

        function startGame() {
            activeDeck = [...recipes].sort(() => 0.5 - Math.random());
            isFlipped = false;
            currentServings = 2;
            renderGameCard();
        }

        function toggleFlip() {
            const cardBox = document.getElementById('activeCardBox');
            if (cardBox) {
                isFlipped = !isFlipped;
                cardBox.classList.toggle('flipped', isFlipped);
                cardBox.style.transform = `rotateY(${isFlipped ? 180 : 0}deg)`;
            }
        }

        function renderGameCard() {
            const container = document.getElementById('deckContainer');
            const statusText = document.getElementById('gameStatus');
            const controls = document.getElementById('gameControls');
            container.innerHTML = '';

            if (activeDeck.length === 0) {
                statusText.textContent = "Stapel leer";
                container.innerHTML = `<div class="h-[400px] flex items-center justify-center text-slate-400">Alles durchgeschaut!</div>`;
                controls.style.display = 'none';
                return;
            }

            if (activeDeck.length === 1) {
                statusText.textContent = "Gewinner!";
                container.innerHTML = createWinnerCardHTML(activeDeck[0]);
                controls.innerHTML = `<button class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg" onclick="startGame()">Nochmal spielen 🔀</button>`;
                return;
            }

            statusText.textContent = `${activeDeck.length} Rezepte im Stapel`;
            controls.innerHTML = `
                <button class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow border text-rose-500 font-bold" onclick="animateSwipe('left')">✕</button>
                <button class="px-4 h-11 rounded-xl bg-white dark:bg-slate-800 shadow font-bold text-xs" onclick="toggleFlip()">🔄 Anleitung</button>
                <button class="px-4 h-11 rounded-xl bg-amber-500 shadow text-white font-bold text-xs" onclick="forceInstantWin()">⚡ Direkt kochen</button>
                <button class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow border text-emerald-500 font-bold" onclick="animateSwipe('right')">♥</button>
            `;

            const r = activeDeck[0];
            const cardBox = document.createElement('div');
            cardBox.className = 'w-full h-[465px] relative preserve-3d transition-transform duration-300 interactive-card cursor-pointer';
            cardBox.id = 'activeCardBox';
            
            let imgHtml = r.image ? `<div class="w-full h-32 rounded-xl overflow-hidden mb-2"><img src="${r.image}" class="w-full h-full object-cover"></div>` : `<div class="w-full h-24 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-3xl mb-2">🍽️</div>`;
            
            cardBox.innerHTML = `
                <div class="absolute inset-0 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[28px] shadow-card p-5 flex flex-col backface-hidden">
                    <div class="flex justify-between items-start mb-2"><h3 class="font-black text-base">${r.title}</h3><span class="text-xs">${r.type === 'Vegetarisch' ? '🌱' : '🍗'}</span></div>
                    ${imgHtml}
                    <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-2 rounded-xl mb-2">
                        <span class="text-[10px] text-slate-400 font-bold">Portionen:</span>
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); changeServings(-1, '', false)" class="w-6 h-6 rounded bg-white shadow-sm text-xs font-bold text-slate-700">-</button>
                            <span class="text-xs font-bold"><span class="servings-count">${currentServings}</span></span>
                            <button onclick="event.stopPropagation(); changeServings(1, '', false)" class="w-6 h-6 rounded bg-white shadow-sm text-xs font-bold text-slate-700">+</button>
                        </div>
                    </div>
                    <div class="text-[10px] font-bold text-slate-400 mb-1 uppercase">Zutaten:</div>
                    <div class="flex-grow overflow-y-auto custom-scrollbar text-xs">
                        <ul id="gameIngredientsList">${r.ingredients.map(i => `<li class="py-0.5">✔ ${parseAndScaleIngredient(i, 2, currentServings)}</li>`).join('')}</ul>
                    </div>
                </div>
                <div class="absolute inset-0 bg-slate-50 dark:bg-slate-900 border dark:border-slate-800 rounded-[28px] shadow-card p-5 flex flex-col backface-hidden rotate-y-180">
                    <div class="text-[10px] font-bold text-slate-400 mb-1 uppercase">Zubereitung:</div>
                    <div class="flex-grow overflow-y-auto custom-scrollbar text-xs leading-relaxed">
                        ${r.details.map((s, i) => `<p class="mb-1"><strong>${i+1}.</strong> ${s}</p>`).join('')}
                    </div>
                </div>
            `;
            
            cardBox.onclick = (e) => { if (!e.target.closest('button')) toggleFlip(); };
            container.appendChild(cardBox);
            activeCardEl = cardBox;
        }

        function animateSwipe(direction) {
            if (activeDeck.length <= 1) return;
            activeCardEl.style.transition = 'transform 0.3s ease-out, opacity 0.3s';
            activeCardEl.style.transform = `translateX(${direction === 'right' ? '150%' : '-150%'}) rotate(${direction === 'right' ? '20deg' : '-20deg'})`;
            activeCardEl.style.opacity = '0';
            setTimeout(() => {
                if (direction === 'right') { activeDeck.push(activeDeck.shift()); } else { activeDeck.shift(); }
                renderGameCard();
            }, 200);
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            container.innerHTML = '';
            renderFilterBar();

            let filtered = recipes.filter(r => r.title.toLowerCase().includes(searchVal));

            if (currentFilterTag !== "Alle") {
                filtered = filtered.filter(r => r.type === currentFilterTag);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-xs text-slate-400">Keine Rezepte gefunden.</div>`;
                return;
            }

            filtered.forEach(recipe => {
                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-slate-900 p-3 rounded-2xl flex items-center gap-3 shadow-premium border dark:border-slate-800';
                div.innerHTML = `
                    <div class="flex-grow"><div class="font-bold text-sm">${recipe.title}</div><div class="text-[10px] text-slate-400">${recipe.type} ${recipe.time ? '• ' + recipe.time : ''}</div></div>
                    <div class="flex gap-1">
                        <button class="p-2 bg-slate-50 dark:bg-slate-800 rounded-lg text-xs" onclick="openEditModal(${recipe.id})">✏️</button>
                        <button class="p-2 bg-rose-50 text-rose-500 rounded-lg text-xs" onclick="triggerDelete(${recipe.id})">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderFilterBar() {
            const bar = document.getElementById('listFilters');
            bar.innerHTML = '';
            ["Alle", "Vegetarisch", "Fleisch"].forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-xs font-bold border ${currentFilterTag === tag ? 'bg-primary text-white border-primary' : 'bg-white dark:bg-slate-900 text-slate-500 border-slate-200 dark:border-slate-800'}`;
                btn.textContent = tag;
                btn.onclick = () => { currentFilterTag = tag; renderList(); };
                bar.appendChild(btn);
            });
        }

        function addListRow(containerId, value = '') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'flex gap-1 items-center w-full';
            div.innerHTML = `
                <input type="text" class="list-input-field flex-grow px-3 py-1.5 border dark:border-slate-700 bg-white dark:bg-slate-800 rounded-xl text-xs outline-none" value="${value.replace(/"/g, '&quot;')}">
                <button type="button" class="text-rose-500 text-xs px-2" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(div);
        }

        function getDynamicListValues(containerId) {
            let values = [];
            document.getElementById(containerId).querySelectorAll('.list-input-field').forEach(input => {
                if (input.value.trim() !== '') values.push(input.value.trim());
            });
            return values;
        }

        function populateDynamicList(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (Array.isArray(data)) data.forEach(val => addListRow(containerId, val));
            if (container.children.length === 0) addListRow(containerId, '');
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUploadedImage = e.target.result;
                document.getElementById('imgPreview').src = currentUploadedImage;
                document.getElementById('previewWrapper').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeFormImage() {
            currentUploadedImage = null;
            document.getElementById('formImage').value = "";
            document.getElementById('previewWrapper').classList.add('hidden');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = "Neues Rezept";
            document.getElementById('formRecipeId').value = "";
            document.getElementById('formTitle').value = "";
            document.getElementById('formTime').value = "";
            document.getElementById('formTags').value = "";
            document.getElementById('typeVeg').checked = false;
            document.getElementById('typeMeat').checked = false;
            removeFormImage();
            populateDynamicList('ingredientsListContainer', []);
            populateDynamicList('stepsListContainer', []);
            openModalWindow();
        }

        function openEditModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            document.getElementById('modalTitle').textContent = "Rezept bearbeiten";
            document.getElementById('formRecipeId').value = recipe.id;
            document.getElementById('formTitle').value = recipe.title;
            document.getElementById('formTime').value = recipe.time || "";
            if (recipe.type === "Vegetarisch") document.getElementById('typeVeg').checked = true; else document.getElementById('typeMeat').checked = true;
            currentUploadedImage = recipe.image;
            if (recipe.image) {
                document.getElementById('imgPreview').src = recipe.image;
                document.getElementById('previewWrapper').classList.remove('hidden');
            } else { removeFormImage(); }
            populateDynamicList('ingredientsListContainer', recipe.ingredients || []);
            populateDynamicList('stepsListContainer', recipe.details || []);
            openModalWindow();
        }

        function openModalWindow() {
            document.getElementById('recipeModal').classList.remove('hidden');
            document.getElementById('recipeModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('recipeModal').classList.add('hidden');
            document.getElementById('recipeModal').classList.remove('flex');
        }

        async function saveRecipe() {
            const title = document.getElementById('formTitle').value.trim();
            const typeInput = document.querySelector('input[name="formType"]:checked');
            const time = document.getElementById('formTime').value.trim();
            const ingredients = getDynamicListValues('ingredientsListContainer');
            const details = getDynamicListValues('stepsListContainer');

            if (!title || !typeInput || ingredients.length === 0 || details.length === 0) {
                showToast("Bitte fülle alle Pflichtfelder aus!");
                return;
            }

            const rId = document.getElementById('formRecipeId').value;
            const recipeData = {
                title: title,
                type: typeInput.value,
                time: time,
                image: currentUploadedImage,
                ingredients: ingredients,
                details: details,
                calories: parseInt(document.getElementById('nutCal').value) || null,
                protein: parseInt(document.getElementById('nutProt').value) || null,
                carbs: parseInt(document.getElementById('nutCarb').value) || null
            };

            showToast("Speichere in der Cloud... ☁️");

            let result;
            if (rId) {
                result = await supabaseClient.from('recipes').update(recipeData).eq('id', rId);
            } else {
                result = await supabaseClient.from('recipes').insert([recipeData]);
            }

            if (result.error) {
                showToast("Fehler beim Cloud-Speichern.");
            } else {
                showToast("In Cloud gesichert! 🎉");
                closeModal();
                await loadRecipesFromCloud();
            }
        }

        function triggerDelete(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            document.getElementById('confirmMessage').innerHTML = `Möchtest du <strong>"${recipe.title}"</strong> wirklich aus der Cloud löschen?`;
            pendingConfirmAction = async () => {
                showToast("Lösche aus Cloud...");
                const { error } = await supabaseClient.from('recipes').delete().eq('id', id);
                if (error) showToast("Fehler beim Löschen."); else showToast("Erfolgreich gelöscht!");
                await loadRecipesFromCloud();
            };
            openConfirmModal();
        }

        function openConfirmModal() { document.getElementById('confirmModal').classList.remove('hidden'); document.getElementById('confirmModal').classList.add('flex'); document.getElementById('confirmExecuteBtn').onclick = () => { pendingConfirmAction(); closeConfirmModal(); }; }
        function closeConfirmModal() { document.getElementById('confirmModal').classList.add('hidden'); document.getElementById('confirmModal').classList.remove('flex'); }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => { toast.classList.add('opacity-0'); toast.classList.remove('opacity-100'); }, 2000);
        }
    </script>
</body>
</html>
